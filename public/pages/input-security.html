<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BugSafari: Stricter Validation</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { font-family: sans-serif; padding: 40px; background: #1a1a2e; color: white; }
        #app-container { border: 2px solid #444; padding: 20px; border-radius: 8px; }
        input { padding: 10px; width: 250px; }
        button { background: #c0392b; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        #bug-report { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 15px; background: #444; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Stricter Validation Simulation</h1>
    <p>Any input shorter than 8 characters or random spam is now blocked.</p>

    <div id="app-container">
        <input type="text" id="userInput" placeholder="Enter text here...">
        <button onclick="submitBio()">Submit Bio</button>
    </div>

    <div id="bug-report"></div>

    <a href="/" class="back-btn">← Back to Homepage</a>

    <script>
        function submitBio() {
            const input = document.getElementById('userInput').value;
            const report = document.getElementById('bug-report');

            const xssPattern = /<script.*?>.*?<\/script>/gi;
            const profanityList = ["badword", "curse", "ugly", "dumb"]; 
            const isProfane = profanityList.some(word => input.toLowerCase().includes(word));

            // STRICTOR SPAM LOGIC
            const isTooShort = input.trim().length < 8; // Blocks "hjdsjf"
            const hasNoSpaces = input.length > 10 && !input.includes(" ");
            const hasRepeatedChars = /(.)\1{3,}/.test(input);
            const isTooRandom = isTooShort || hasNoSpaces || hasRepeatedChars;

            if (xssPattern.test(input) || isProfane || isTooRandom) {
                report.style.display = "block";
                report.style.backgroundColor = "#c0392b";
                report.innerHTML = `<strong>BugSafari Detection:</strong><br>
                                    Type: Security/Policy Violation<br>
                                    Status: Input rejected! Your bio is too short or contains invalid content.`;

                fetch('/api/routes/log-bug', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        category: 'Security/Policy',
                        message: `Blocked input: ${input}`,
                        url: window.location.pathname
                    })
                });
                return;
            }

            alert("Bio submitted successfully: " + input);
        }
    </script>
</body>
</html>
